{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Delete Default Meal</h1>
    <p>Are you sure you want to delete "<strong>{{ default_meal.name }} </strong>"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'default_meals' %}">Cancel</a>
    </form>
</div>
{% endblock %}
