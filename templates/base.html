<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}LibrePlate{% endblock %}</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'shared/css/base.css' %}">
    <script src="https://unpkg.com/htmx.org@2.0.7"></script>
    {% block extra_head %}{% endblock %}
</head>

<body
    hx-headers='{"X-CSRFToken":"{{ csrf_token }}"}'
    hx-ext="json-enc"
>

<div id="globalTopbar">

    <div class="topbar-left">
        <button id="toggleSidebar" class="icon-btn">☰</button>
    </div>

    <div class="topbar-center">
        <div class="logo">
            <span class="logo-emoji">🍽️</span>
            <span class="logo-libre">Libre</span><span class="logo-plate">Plate</span>
        </div>
    </div>

    <div class="topbar-right">
        <form method="post" action="{% url 'logout' %}" style="margin:0;">
            {% csrf_token %}
            <button type="submit" class="icon-btn logout-btn-wide">
                Logout ➜
            </button>
        </form>
    </div>

</div>

<div id="sidebar" class="{% if user_settings and user_settings.collapsed_sidebar %}collapsed{% endif %}">

    <div class="nav-links">
        <a href="{% url 'diary_today' %}"><span>📔</span><span class="label">Diary</span></a>
        <a href="{% url 'groceries' %}"><span>🛒</span><span class="label">Groceries</span></a>
        <a href="{% url 'recipes' %}"><span>🍲</span><span class="label">Recipes</span></a>
        <a href="{% url 'foods' %}"><span>🍎</span><span class="label">Foods</span></a>
        <a href="{% url 'user_statistics' %}"><span>📊</span><span class="label">Statistics</span></a>
        <a href="{% url 'goals' %}"><span>🎯</span><span class="label">Goals</span></a>
    </div>

    <div class="bottom-links">
        <a href="{% url 'profile' %}">
            <span>👤</span><span class="label">Account</span>
        </a>
        <a href="{% url 'settings' %}">
            <span>⚙️</span><span class="label">Settings</span>
        </a>
    </div>

</div>

<div id="content">
    {% block content %}{% endblock %}
</div>

<script>
const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("toggleSidebar");

toggleBtn.addEventListener("click", function () {
    const collapsed = sidebar.classList.toggle("collapsed");

    htmx.ajax("POST", "{% url 'toggle_sidebar' %}", {
        values: {
            collapsed: collapsed
        },
        swap: "none"
    });
});

document.body.addEventListener("htmx:responseError", function(evt) {
    console.error("HTMX request failed", evt.detail);
});

document.body.addEventListener("htmx:sendError", function(evt) {
    console.error("Network error", evt.detail);
});
</script>

{% block scripts %}{% endblock %}

</body>
</html>
