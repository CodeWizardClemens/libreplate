{% extends "base.html" %}
{% block page_heading %}Edit {{grocery.name}}{% endblock %}

{% load static %}

{% block extra_head %}
<link rel="stylesheet" href="{% static 'groceries/css/detail.css' %}">
{% endblock %}

{% block content %}
<h1>{{ grocery }}</h1>

<ul>
    {% for item in grocery.items.all %}
        {% include "groceries/partials/item.html" %}
    {% endfor %}
</ul>
{% endblock %}
