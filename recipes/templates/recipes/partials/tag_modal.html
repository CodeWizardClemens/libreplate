<div class="modal fade show d-block" tabindex="-1" style="background: rgba(0,0,0,.5);">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">
                    Recipe tags
                </h5>

                <button 
                    type="button"
                    class="btn-close"
                    onclick="document.getElementById('tag-modal').innerHTML=''"
                ></button>
            </div>

            <form
                hx-post="{% url 'recipe_tags_save' recipe.id %}"
                hx-target="#tag-button"
                hx-swap="innerHTML"
                hx-on::after-request="document.getElementById('tag-modal').innerHTML=''"
            >
                {% csrf_token %}

                <div class="modal-body">

                    {% for tag in tags %}
                        <div class="form-check">
                            <input
                                class="form-check-input"
                                type="checkbox"
                                name="tags"
                                value="{{ tag.id }}"
                                id="tag-{{ tag.id }}"
                                {% if tag.id in selected_tags %}checked{% endif %}
                            >

                            <label
                                class="form-check-label"
                                for="tag-{{ tag.id }}"
                            >
                                {{ tag.name }}
                            </label>
                        </div>
                    {% empty %}
                        <p class="text-muted">
                            No tags available.
                        </p>
                    {% endfor %}

                </div>

                <div class="modal-footer">
                    <button
                        type="button"
                        class="btn btn-secondary"
                        onclick="document.getElementById('tag-modal').innerHTML=''"
                    >
                        Cancel
                    </button>

                    <button
                        type="submit"
                        class="btn btn-primary"
                    >
                        Save
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>
