<div id="tagsModalContainer">

    <div
        class="modal fade"
        id="tagsModal"
        data-keep-open="{% if keep_tags_modal_open %}true{% endif %}"
        tabindex="-1"
        aria-labelledby="tagsModalLabel"
        aria-hidden="true"
    >
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5
                        class="modal-title"
                        id="tagsModalLabel"
                    >
                        Manage tags
                    </h5>

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"
                    ></button>
                </div>

                <div class="modal-body">

                    <div class="mb-3">

                        <form id="tagForm">

                            {% csrf_token %}

                            <div class="input-group">

                                {{ tag_form.name }}

                                <button
                                    class="btn btn-primary"
                                    type="button"
                                    hx-post="{% url 'recipe_tag_create' %}"
                                    hx-include="#tagForm"
                                    hx-headers='{"X-Tags-Modal-Open": "true"}'
                                    hx-target="#recipesContent"
                                    hx-swap="outerHTML"
                                >
                                    Add
                                </button>

                            </div>

                        </form>

                    </div>

                    <div class="list-group list-group-flush">

                        {% for tag in tags %}

                            <div class="list-group-item px-0">

                                <div class="d-flex justify-content-between align-items-center">

                                    <div>

                                        <input
                                            class="btn-check"
                                            type="checkbox"
                                            name="{{ filter_form.tags.html_name }}"
                                            value="{{ tag.id }}"
                                            id="search-tag-{{ tag.id }}"
                                            autocomplete="off"
                                            {% if tag.id in selected_tags %}checked{% endif %}
                                            hx-get="{% url 'recipes' %}"
                                            hx-include="#filterForm"
                                            hx-target="#recipesContent"
                                            hx-swap="outerHTML"
                                            hx-push-url="true"
                                        >

                                        <label
                                            class="btn btn-outline-primary btn-sm"
                                            for="search-tag-{{ tag.id }}"
                                        >
                                            {{ tag.name }}
                                        </label>

                                    </div>

                                    <button
                                        type="button"
                                        class="btn btn-outline-danger btn-sm"
                                        hx-post="{% url 'recipe_tag_delete' tag.id %}"
                                        hx-include="#filterForm"
                                        hx-headers='{"X-Tags-Modal-Open": "true"}'
                                        hx-target="#recipesContent"
                                        hx-swap="outerHTML"
                                        hx-confirm="Delete '{{ tag.name }}'?"
                                    >
                                        Delete
                                    </button>

                                </div>

                            </div>

                        {% empty %}

                            <div class="text-muted">
                                No tags yet.
                            </div>

                        {% endfor %}

                    </div>

                </div>

            </div>
        </div>
    </div>

</div>
