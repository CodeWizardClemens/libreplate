<div id="searchbar-tag-dropdown">
    <button
        class="btn btn-outline-primary dropdown-toggle"
        type="button"
        data-bs-toggle="dropdown"
        data-bs-auto-close="outside">
        Filter by tags
    </button>

    <div class="dropdown-menu p-3" style="min-width: 250px;">
        {% for tag in tags %}
            <div class="form-check">
                <input
                    class="form-check-input"
                    type="checkbox"
                    name="tags"
                    value="{{ tag.id }}"
                    id="search-tag-{{ tag.id }}"
                    {% if tag.id in selected_tags %}checked{% endif %}
                    hx-get="{% url 'recipes' %}{{ request.get_full_path|cut:'/recipes/' }}"                    hx-include="closest form"
                    hx-trigger="change"
                    hx-target="#recipesContainer"
                    hx-swap="outerHTML">

                <label
                    class="form-check-label"
                    for="search-tag-{{ tag.id }}">
                    {{ tag.name }}
                </label>
            </div>
        {% endfor %}
    </div>
</div>
