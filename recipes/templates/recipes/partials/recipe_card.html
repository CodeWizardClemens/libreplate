<div class="card">

    <label style="display:flex; align-items:center; gap:10px;">

        <input
            type="checkbox"
            name="recipes"
            value="{{ recipe.id }}"
            class="recipe-checkbox"
        />

        <span>
            {{ recipe.name }}
            {% if recipe.summary %}
                - {{ recipe.summary }}
            {% endif %}
        </span>

    </label>

    <a href="{% url 'recipe_edit' recipe.id %}">
        Edit
    </a>

    <form method="post" action="{% url 'recipe_copy' recipe.id %}" style="display:inline;">
        {% csrf_token %}
        <button type="submit">
            Copy
        </button>
    </form>

    <form
        method="post"
        action="{% url 'recipe_delete' recipe.id %}"
        style="display:inline;"
        onsubmit="return confirm('Are you sure you want to delete this recipe? This action can not be undone.');"
    >
        {% csrf_token %}
        <button type="submit">
            Delete
        </button>
    </form>

</div>
