<div class="card shadow-sm">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-start flex-wrap">

            <div class="d-flex align-items-start">

                {% if meal_name %}
                <div class="form-check mt-1">
                    <input
                        class="form-check-input recipe-checkbox"
                        type="checkbox"
                        name="recipes"
                        value="{{ recipe.id }}"
                    >
                </div>
                {% endif %}

                <div>
                    <h5 class="card-title">
                        {{ recipe.name }}
                    </h5>

                    {% if recipe.summary %}
                        <p class="card-text text-body-secondary mb-0">
                            {{ recipe.summary }}
                        </p>
                    {% endif %}
                </div>

            </div>

            <div class="d-flex gap-2 flex-wrap">

                <div id="favorite-button">
                    {% include "recipes/partials/favorite_button.html" %}
                </div>

                <div id="tag-button">
                    {% include "recipes/partials/tag_button.html" with recipe=recipe %}
                </div>

                <a
                    href="{% url 'recipe_edit' recipe.id %}"
                    class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-pencil"></i>
                    Edit
                </a>

                <form
                    method="post"
                    action="{% url 'recipe_copy' recipe.id %}">
                    {% csrf_token %}
                    <button
                        type="submit"
                        class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-copy"></i>
                        Copy
                    </button>
                </form>

                <form
                    method="post"
                    action="{% url 'recipe_delete' recipe.id %}"
                    onsubmit="return confirm('Are you sure you want to delete this recipe? This action can not be undone.');">
                    {% csrf_token %}
                    <button
                        type="submit"
                        class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-trash"></i>
                        Delete
                    </button>
                </form>

            </div>

        </div>
    </div>
</div>

<div id="tag-modal"></div>
