<button
    class="btn btn-sm btn-outline-secondary"
    hx-post="{% url 'toggle_favorite' recipe.id %}"
    hx-target="this"
    hx-swap="outerHTML">
    {% csrf_token %}
    {% if recipe.is_favorite %}
        <i class="bi bi-star-fill"></i>
    {% else %}
        <i class="bi bi-star"></i>
    {% endif %}
</button>
