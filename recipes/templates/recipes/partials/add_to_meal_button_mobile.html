<!-- add_to_meal_button_mobile.html -->

<div class="add-button">
    <button
        id="addSelectedBtnMobile"
        class="btn btn-primary"
        type="submit"
        form="recipeSelectionForm"
        disabled>
        Add to {{ meal_name }}
    </button>
</div>

<form
    id="recipeSelectionForm"
    method="post"
    action="
    {% if meal_id %}
        {% url 'add_recipes_to_meal_direct' meal_id meal_name meal_date %}
    {% else %}
        {% url 'recipes' %} 
    {% endif %}
    "
>
    {% csrf_token %}
</form>
