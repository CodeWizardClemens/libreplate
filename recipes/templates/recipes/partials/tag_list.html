<div id="tag-list" class="overflow-auto pe-3" style="max-height: 300px;">
    {% for tag in tags %}
    <div class="d-flex align-items-center mb-2">

        <div class="form-check flex-grow-1 text-truncate pe-2">
            <input
                class="form-check-input"
                type="checkbox"
                name="{{ filter_form.tags.html_name }}"
                value="{{ tag.id }}"
                id="tag-{{ tag.id }}"
                {% if tag.id in selected_tags %}checked{% endif %}

                hx-post="{% url 'recipe_tags_save' recipe.id %}"
                hx-trigger="change"
                hx-target="#tag-button"
                hx-swap="innerHTML"
                hx-include="input[name='tags']:checked"
            >

            <label
                class="form-check-label text-truncate d-inline-block w-100"
                for="tag-{{ tag.id }}"
                style="max-width: calc(100% - 2rem);"
            >
                {{ tag.name }}
            </label>
        </div>

        <button
            type="button"
            class="btn btn-sm btn-outline-danger ms-2 flex-shrink-0"
            hx-post="{% url 'recipe_tag_delete' tag.id %}"
            hx-vals='{"recipe_id":"{{ recipe.id }}"}'
            hx-target="#tag-list"
            hx-swap="innerHTML"
            hx-confirm="Are you sure you want to delete this recipe tag? This action cannot be undone."
        >
            <i class="bi bi-trash"></i>
        </button>

    </div>

    {% empty %}
    <p class="text-muted mb-0">
        No tags available.
    </p>
    {% endfor %}
</div>
