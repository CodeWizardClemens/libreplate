{% for tag in tags %}
<div class="d-flex align-items-center mb-2">

    <div class="form-check flex-grow-1">

        <input
            class="form-check-input"
            type="checkbox"
            name="tags"
            value="{{ tag.id }}"
            id="tag-{{ tag.id }}"
            {% if tag.id in selected_tags %}checked{% endif %}

            hx-post="{% url 'recipe_tags_save' recipe.id %}"
            hx-trigger="change"
            hx-target="#tag-button"
            hx-swap="innerHTML"
            hx-include="input[name='tags']:checked"
        >

        <label
            class="form-check-label"
            for="tag-{{ tag.id }}"
        >
            {{ tag.name }}
        </label>

    </div>

    <button
        type="button"
        class="btn btn-sm btn-outline-danger ms-2"
        hx-post="{% url 'recipe_tag_delete' tag.id %}"
        hx-vals='{"recipe_id":"{{ recipe.id }}"}'
        hx-target="#tag-list"
        hx-swap="innerHTML"
        hx-confirm="Are you sure you want to delete this recipe tag? This action cannot be undone."
    >
        <i class="bi bi-trash"></i>
    </button>

</div>

{% empty %}
<p class="text-muted">
    No tags available.
</p>
{% endfor %}
