<button
    type="button"
    class="{% if edit %}btn btn-primary{% else %}form-control text-start{% endif %}"
    onclick="toggleFilter('edit')"
    hx-get="{% url 'recipes' %}"
    hx-include="#filterForm"
    hx-target="#recipesContent"
    hx-swap="outerHTML"
    hx-push-url="true">
    
    <i class="bi bi-pencil{% if edit %}-fill{% endif %}"></i> Edit
</button>
