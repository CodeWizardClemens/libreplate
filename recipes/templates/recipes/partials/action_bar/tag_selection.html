<div class="d-flex align-items-center gap-2 position-relative">
    <span class="text-muted flex-shrink-0">Tags:</span>

    <div id="searchbar-tags" class="d-flex flex-nowrap gap-1 overflow-auto py-2">
        {% for tag in tags %}

            <div class="d-inline-flex align-items-center flex-shrink-0">

                <input
                    class="btn-check"
                    type="checkbox"
                    name="tags"
                    value="{{ tag.id }}"
                    id="search-tag-{{ tag.id }}"
                    autocomplete="off"
                    {% if tag.id in selected_tags %}checked{% endif %}
                    hx-get="{% url 'recipes' %}"
                    hx-include="#filterForm"
                    hx-target="#recipesContent"
                    hx-swap="outerHTML"
                    hx-push-url="true"
                >

                <label
                    class="btn btn-link btn-sm text-decoration-none tag-btn"
                    for="search-tag-{{ tag.id }}"
                >
                    {{ tag.name }}
                </label>

                {% if edit %}
                    <button
                        type="button"
                        hx-post="{% url 'recipe_tag_delete' tag.id %}"
                        hx-target="#recipesContent"
                        hx-swap="innerHTML"
                        hx-include="#filterForm"
                        class="btn btn-link btn-sm text-danger p-0 ms-1 tag-delete-btn"
                        aria-label="Delete tag"
                        onclick="event.stopPropagation();"
                    >
                        <span class="btn-close btn-close-sm" aria-hidden="true"></span>
                    </button>
                {% endif %}

            </div>

        {% endfor %}


        {% if edit %}
            <button
                type="button"
                class="btn btn-link btn-sm text-decoration-none tag-add-btn"
                data-bs-toggle="modal"
                data-bs-target="#tag-create-modal"
            >
                +
            </button>
        {% endif %}
    </div>


    {% if edit %}
        <div
            class="modal fade"
            id="tag-create-modal"
            tabindex="-1"
            aria-hidden="true"
            data-bs-backdrop="true"
        >
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">

                    <div class="modal-body">
                        <div class="d-flex gap-2">

                            <input
                                type="text"
                                name="name"
                                class="form-control form-control-sm"
                                placeholder="New tag..."
                            >

                            <button
                                type="button"
                                class="btn btn-primary btn-sm"
                                hx-post="{% url 'recipe_tag_create' %}"
                                hx-target="#recipesContent"
                                hx-swap="innerHTML"
                                hx-include="#filterForm, #tag-create-modal"
                                data-bs-dismiss="modal"
                            >
                                Add
                            </button>

                        </div>
                    </div>

                </div>
            </div>
        </div>
    {% endif %}

</div>


<style>
#searchbar-tags .tag-btn {
    border-radius: 0;
    border-bottom: 2px solid transparent;
    color: var(--bs-body-color);
    padding: 0.1rem 0.2rem;
    text-decoration: none;
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease;
}

#searchbar-tags .btn-check:checked + .tag-btn {
    color: var(--bs-primary);
    border-bottom-color: var(--bs-primary);
    font-weight: 600;
}

#searchbar-tags .tag-btn:hover {
    color: var(--bs-primary);
}

#searchbar-tags .tag-delete-btn {
    line-height: 1;
    text-decoration: none;
}

#searchbar-tags .tag-delete-btn .btn-close {
    width: 0.65rem;
    height: 0.65rem;
}

#searchbar-tags .tag-add-btn {
    padding: 0.1rem 0.3rem;
    font-size: 1.1rem;
    line-height: 1;
}
</style>
