<!-- favorite_button.html -->

<button
    type="button"
    class="
        {% if favorites_only %}
            btn btn-outline-primary
        {% else %}
            form-control text-start
        {% endif %}
    "
    onclick="toggleFilter('favorites')"
    hx-get="{% url 'recipes' %}"
    hx-include="#filterForm"
    hx-target="#recipesContent"
    hx-swap="outerHTML"
    hx-push-url="true"
>
    <i class="bi bi-star{% if favorites_only %}-fill{% endif %}"></i>
</button>
