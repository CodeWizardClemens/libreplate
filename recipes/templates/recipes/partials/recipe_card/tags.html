<!-- tags.html -->

<div class="recipe-card-tags d-flex flex-wrap gap-1 mt-2">

    {% if recipe.tags.exists %}
        {% for tag in recipe.tags.all %}

            <div
                class="d-inline-flex"
                onclick="event.stopPropagation();">

                {% if edit %}
                    <button
                        type="button"
                        hx-post="{% url 'delete_tag_from_recipe' recipe.id tag.id %}"
                        hx-target="#recipesContent"
                        hx-swap="innerHTML"
                        hx-include="#filterForm"
                        class="badge rounded-pill text-bg-primary"
                        style="border: none; padding: 0.25rem 0.5rem; cursor: pointer;">

                        <span>{{ tag.name }}</span>
                        <span class="btn-close btn-close-white ms-2" aria-label="Remove tag"></span>

                    </button>
                {% else %}
                    <span class="badge rounded-pill text-bg-primary">
                        {{ tag.name }}
                    </span>
                {% endif %}

            </div>

        {% endfor %}
    {% endif %}


    {% if edit %}
        {% include "recipes/partials/recipe_card/tag_add.html" %}
    {% endif %}

</div>

<style>
.recipe-tag-badge {
    padding: 0.43rem 0.5rem;
}
</style>
