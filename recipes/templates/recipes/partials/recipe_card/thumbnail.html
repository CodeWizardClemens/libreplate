<!-- recipe_card_thumbnail.html -->

{% with picture=recipe.pictures.first %}
<div class="recipe-thumbnail">

    {% if picture %}
        <img
            src="{{ picture.image.url }}"
            alt="{{ recipe.name }}"
            class="recipe-thumbnail-image rounded border">
    {% else %}
        <div class="recipe-thumbnail-placeholder rounded border bg-body-secondary d-flex align-items-center justify-content-center">
            <i class="bi bi-image fs-4 text-secondary"></i>
        </div>
    {% endif %}

</div>
{% endwith %}

<style>
.recipe-thumbnail {
    flex: 0 0 auto;
}

.recipe-thumbnail-image {
    display: block;
    width: auto;
    height: auto;
    max-width: clamp(80px, 12vw, 160px);
    max-height: clamp(80px, 12vw, 160px);
}

.recipe-thumbnail-placeholder {
    width: clamp(80px, 12vw, 160px);
    height: clamp(80px, 12vw, 160px);
}
</style>
