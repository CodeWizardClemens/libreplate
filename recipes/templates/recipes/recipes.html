{% extends "base.html" %}

{% block content %}

<div class="page-header">
    <h1>Recipes</h1>

    <a href="{% url 'recipe_create' %}" class="btn btn-primary">
        + New recipe
    </a>
</div>

<div>

    {% for recipe in recipes %}

        <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
            <span>
                {{ recipe.name }}
                {% if recipe.summary %}
                 - {{ recipe.summary }}
                {% endif %}
            </span>

            <a href="{% url 'recipe_edit' recipe.id %}">
                Edit
            </a>

            <form
                method="post"
                action="{% url 'recipe_delete' recipe.id %}"
                style="display:inline; margin:0;"
                onsubmit="return confirm('Are you sure you want to delete this recipe? This action can not be undone.');"
            >
                {% csrf_token %}
                <button
                    type="submit"
                    style="background:none;border:none;color:#0d6efd;text-decoration:underline;cursor:pointer;padding:0;"
                >
                    Delete
                </button>
            </form>
        </div>

    {% empty %}

        <p>No recipes yet.</p>

    {% endfor %}

</div>

{% endblock %}
