{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>{% if unit %}Edit Unit{% else %}New Unit{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'units' %}">Cancel</a>
    </form>
</div>
{% endblock %}
