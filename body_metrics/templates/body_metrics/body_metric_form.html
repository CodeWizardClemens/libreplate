{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>{% if body_metric %}Edit Body Metric{% else %}New Body Metric{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'body_metrics' %}">Cancel</a>
    </form>
</div>
{% endblock %}
