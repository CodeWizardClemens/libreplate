{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Delete Body Metric</h1>
    <p>Are you sure you want to delete "<strong>{{ body_metric.name }}</strong>"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'body_metrics' %}">Cancel</a>
    </form>
</div>
{% endblock %}
