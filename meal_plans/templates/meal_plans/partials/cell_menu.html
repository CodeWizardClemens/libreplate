<div class="modal fade" tabindex="-1" id="cellMenuModal-{{ meal_plan.id }}-{{ meal.id }}-{{ day }}">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">
                    {{ meal.name }} — {{ day_display }}
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">

                    <form
                        id="cell-add-form-{{ meal_plan.id }}-{{ meal.id }}-{{ day }}"
                        hx-post="{% url 'cell_add_item' meal_plan.id %}"
                        hx-trigger="submit"
                        hx-target="#cell-{{ meal.id }}-{{ day }}"
                        hx-swap="innerHTML"
                        hx-indicator="#spinner-{{ meal_plan.id }}-{{ meal.id }}-{{ day }}"
                    >
                    {% csrf_token %}

                    <input type="hidden" name="meal_id" value="{{ meal.id }}">
                    <input type="hidden" name="day" value="{{ day }}">

                    <div class="mb-3">
                        <label class="form-label">Select a food or recipe</label>
                        <select class="form-select" name="item_id" id="item-select-{{ meal_plan.id }}-{{ meal.id }}-{{ day }}">
                            <optgroup label="Foods">
                                {% for food in foods %}
                                    <option value="{{ food.id }}" data-type="food">
                                        {{ food.name }}
                                    </option>
                                {% endfor %}
                            </optgroup>
                            <optgroup label="Recipes">
                                {% for recipe in recipes %}
                                    <option value="{{ recipe.id }}" data-type="recipe">
                                        {{ recipe.name }}
                                    </option>
                                {% endfor %}
                            </optgroup>
                        </select>
                    </div>

                    <input type="hidden" name="item_type" id="item-type-{{ meal_plan.id }}-{{ meal.id }}-{{ day }}" value="food">

                </form>

            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
                    Cancel
                </button>
                <button type="submit" form="cell-add-form-{{ meal_plan.id }}-{{ meal.id }}-{{ day }}" class="btn btn-primary">
                    Add cell-add-form-{{ meal_plan.id }}-{{ meal.id }}-{{ day }}
                </button>
                <span id="spinner-{{ meal_plan.id }}-{{ meal.id }}-{{ day }}" class="htmx-indicator spinner-border spinner-border-sm ms-2"></span>
            </div>

        </div>
    </div>
</div>

<script>
(function() {
    var selectId = "item-select-{{ meal_plan.id }}-{{ meal.id }}-{{ day }}";
    var typeInputId = "item-type-{{ meal_plan.id }}-{{ meal.id }}-{{ day }}";
    var formId = "cell-add-form-{{ meal_plan.id }}-{{ meal.id }}-{{ day }}";

    var select = document.getElementById(selectId);
    var typeInput = document.getElementById(typeInputId);

    // Update hidden item_type when selection changes
    function updateType() {
        var selected = select.options[select.selectedIndex];
        typeInput.value = selected.getAttribute("data-type") || "food";
    }

    select.addEventListener("change", updateType);
    updateType();

    // Prevent double submission
    var form = document.getElementById(formId);
    form.addEventListener("submit", function(e) {
        // HTMX handles it, just ensure we don't trigger native submission too
        // The 'once' trigger above helps, but this adds another layer of protection
        setTimeout(function() {
            select.disabled = true;
        }, 0);
    });

    // Re-enable select after request completes
    document.body.addEventListener("htmx:afterRequest", function(event) {
        if (event.detail.elt && event.detail.elt.id === formId) {
            select.disabled = false;
            select.selectedIndex = 0;  // Reset selection
        }
    });
})();
</script>
