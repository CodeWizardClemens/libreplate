
<div id="searchbar-tags" class="d-flex flex-nowrap gap-1 overflow-auto py-2">
    {% for tag in tags %}

        <div class="d-inline-flex align-items-center flex-shrink-0">

            <input
                class="btn-check"
                type="checkbox"
                name="{{ filter_form.tags.html_name }}"
                value="{{ tag.id }}"
                id="search-tag-{{ tag.id }}"
                autocomplete="off"
                {% if tag.id in selected_tags %}checked{% endif %}
                hx-get="{% url 'recipes' %}"
                hx-include="#filterForm, #searchbar-tags"
                hx-target="#recipesContent"
                hx-swap="outerHTML"
                hx-push-url="true"
            >

            <label
                class="btn btn-link btn-sm text-decoration-none tag-btn"
                for="search-tag-{{ tag.id }}"
            >
                {{ tag.name }}
            </label>

        </div>

    {% endfor %}
</div>


{% if edit %}
    <div
        class="modal fade"
        id="tag-create-modal"
        tabindex="-1"
        aria-hidden="true"
        data-bs-backdrop="true"
    >
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">

                <form
                    id="tag-create-form"
                    hx-post="{% url 'recipe_tag_create' %}"
                    hx-target="#recipesContent"
                    hx-swap="innerHTML"
                >
                    {% csrf_token %}

                    <div class="modal-body">
                        <div class="d-flex gap-2">

                            <input
                                type="text"
                                name="name"
                                class="form-control form-control-sm"
                                placeholder="New tag..."
                                autocomplete="off"
                            >

                            <button
                                type="submit"
                                class="btn btn-primary btn-sm"
                                data-bs-dismiss="modal"
                            >
                                Add
                            </button>

                        </div>
                    </div>

                </form>

            </div>
        </div>
    </div>
{% endif %}



<style>
#searchbar-tags .tag-btn {
    border-radius: 0;
    border-bottom: 2px solid transparent;
    color: var(--bs-body-color);
    padding: 0.1rem 0.2rem;
    text-decoration: none;
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease;
}

#searchbar-tags .btn-check:checked + .tag-btn {
    color: var(--bs-primary);
    border-bottom-color: var(--bs-primary);
    font-weight: 600;
}

#searchbar-tags .tag-btn:hover {
    color: var(--bs-primary);
}

#searchbar-tags .tag-delete-btn {
    line-height: 1;
    text-decoration: none;
}

#searchbar-tags .tag-delete-btn .btn-close {
    width: 0.65rem;
    height: 0.65rem;
}

#searchbar-tags .tag-add-btn {
    padding: 0.1rem 0.3rem;
    font-size: 1.1rem;
    line-height: 1;
}
</style>
