{% load recipe_tags %}

<div class="d-flex flex-wrap gap-1 mt-2">

    {% for nutrient in recipe_nutrients %}

        <span class="badge bg-secondary">

            {{ nutrient.abbreviation|default:nutrient.name }}
            {{ recipe_nutrient_values|get_nested:recipe.id|get_nutrient:nutrient|floatformat:0 }}

        </span>

    {% endfor %}

</div>
