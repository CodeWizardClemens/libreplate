<button
    class="btn btn-sm {% if recipe.is_pinned %}btn-primary{% else %}btn-outline-secondary{% endif %}"
    hx-post="{% url 'toggle_pin' recipe.id %}"
    hx-target="#recipesContent"
    hx-swap="innerHTML">
    {% csrf_token %}
    {% if recipe.is_pinned %}
        <i class="bi bi-pin-angle-fill"></i>
    {% else %}
        <i class="bi bi-pin-angle"></i>
    {% endif %}
</button>
