{% for item in cell_items %}
    <span class="d-inline-flex flex-column bg-light border rounded px-0 py-0 small text-start"
          style="width:14ch;">

        <span class="text-truncate"
              style="font-size:.75rem;">
            {{ item.name }}
        </span>

        <span class="d-flex align-items-center justify-content-between w-100">
            {% if item.type == "food" %}
                {% url 'cell_remove_food' meal_plan.id item.id as delete_url %}
                <i class="bi bi-egg-fill" style="font-size:.7rem;"></i>
            {% else %}
                {% url 'cell_remove_recipe' meal_plan.id item.id as delete_url %}
                <i class="bi bi-card-text" style="font-size:.7rem;"></i>
            {% endif %}

            <button type="button"
                    class="btn btn-link p-0 lh-1 text-danger text-decoration-none"
                    style="font-size:.7rem;"
                    title="Remove"
                    hx-post="{{ delete_url }}"
                    hx-vals='{"meal_id": "{{ meal_id }}", "day": "{{ day }}"}'
                    hx-target="closest td"
                    hx-swap="innerHTML"
                    onclick="event.stopPropagation()">
                &times;
            </button>
        </span>
    </span>
{% endfor %}
