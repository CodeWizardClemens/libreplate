<div class="card shadow-sm border rounded-3 mb-3 d-block d-md-none">

    <div class="card-body p-3">

        <div class="d-flex justify-content-between align-items-center mb-3">

            <div
                class="fw-bold fs-5"
                id="mdpMonth">
            </div>


            <div class="d-flex gap-1">

                <button
                    id="prevWeek"
                    class="btn btn-outline-secondary btn-sm">
                    ◀
                </button>


                <button
                    id="nextWeek"
                    class="btn btn-outline-secondary btn-sm">
                    ▶
                </button>


                <button
                    id="todayBtn"
                    class="btn btn-outline-secondary btn-sm">
                    Today
                </button>


                <button
                    id="calendarBtn"
                    class="btn btn-outline-secondary btn-sm">

                    <i class="bi bi-calendar"></i>

                </button>


                <input
                    id="calendarInput"
                    type="date"
                    class="d-none"
                    value="{{ selected_date|date:'Y-m-d' }}"
                >

            </div>

        </div>


        <div class="d-grid text-center small text-secondary fw-semibold mb-2"
             style="grid-template-columns: repeat(7, 1fr);">

            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
            <div>Sun</div>

        </div>


        <div
            id="mdpDays"
            class="d-grid text-center gap-2"
            style="grid-template-columns: repeat(7, 1fr);">

        </div>


    </div>

</div>


<script>
window.selectedDate="{{ selected_date|date:'Y-m-d' }}";
</script>
