<button
    class="btn btn-sm btn-outline-primary"
    hx-post="{% url 'food_toggle_favorite' food.id %}"
    hx-target="this"
    hx-swap="outerHTML">
    {% csrf_token %}
    {% if food.is_favorite %}
        <i class="bi bi-star-fill"></i>
    {% else %}
        <i class="bi bi-star"></i>
    {% endif %}
</button>
