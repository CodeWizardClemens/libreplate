<!-- diary_header.html -->

<a href="{% url 'diary_day' yesterday %}" class="btn btn-secondary">
    ⬅ Yesterday
</a>

<a href="{% url 'diary_today' %}" class="btn btn-primary">
    Go to today
</a>

<input
    class="calendar-picker"
    type="date"
    value="{{ selected_date|date:'Y-m-d' }}"
    onchange="goToDate(this.value)"
>

<a href="{% url 'diary_day' tomorrow %}" class="btn btn-secondary">
    Tomorrow ➡
</a>

<script>
    window.selectedDate = "{{ selected_date|date:'Y-m-d' }}";
</script>
